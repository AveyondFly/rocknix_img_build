name: Create Release with Image

on:
  create:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet jq

      - name: Build the image
        run: |
          chmod +x build_remote.sh
          sudo ./build_remote.sh

      - name: Extract Asset Name and Path
        id: extract_asset
        run: |
          # 使用find确保路径正确，假设文件在downloads目录
          asset_path=$(find . -name "*img.gz" -type f | head -n 1)
          echo "asset_path=$asset_path" >> $GITHUB_OUTPUT
          echo "asset_name=$(basename $asset_path)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1  # 使用社区推荐Action
        with:
          tag_name: ${{ github.ref_name }}  # 直接获取纯版本号
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.extract_asset.outputs.asset_path }}  # 直接传递文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
